name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build GitHub Pages release
        shell: pwsh
        run: |
          ./Tools/Build-GitHubPagesRelease.ps1 -RepositoryName MagicCoinSnapper -OutputPath bin/Release/github-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bin/Release/github-pages/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Email-Benachrichtigung senden
    needs: deploy
    if: github.event_name == 'push' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Email versenden
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: mail.gmx.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: MagicCoinSnapper – Neue Version verfügbar
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Eine neue Version von MagicCoinSnapper wurde auf GitHub Pages veröffentlicht.

            📦 Repository: ${{ github.repository }}
            🌐 URL: ${{ needs.deploy.outputs.page_url }}

            🔨 Commit: ${{ github.event.head_commit.message }}
            👤 Autor: ${{ github.event.head_commit.author.name }}

            🔗 Workflow-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
