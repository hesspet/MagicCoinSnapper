<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MagicCoinSnapper</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MagicCoinSnapper.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <script defer src="https://docs.opencv.org/4.11.0/opencv.js"></script>

    <!-- Custom JS-Funktionen: müssen nach OpenCV geladen werden -->
    <script defer src="js/coinProcessor.js"></script>
    <script defer src="js/camera.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✓</a>
    </div>
    <!-- OpenCV zuerst laden -->
    <script defer src="https://docs.opencv.org/4.11.0/opencv.js"></script>

    <!-- Dann die eigenen Scripts -->
    <script defer src="js/coinProcessor.js"></script>
    <script defer src="js/camera.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
